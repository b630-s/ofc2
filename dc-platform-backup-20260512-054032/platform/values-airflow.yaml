executor: KubernetesExecutor

# Prototype choice:
# use an in-cluster PostgreSQL instance so Airflow remains portable
# across EKS, AKS, GKE, OpenShift, and on-prem Kubernetes.
postgresql:
  enabled: true
  auth:
    username: airflow
    password: airflow
    database: airflow
  primary:
    persistence:
      enabled: true
      storageClass: gp2
      size: 20Gi
      accessModes:
        - ReadWriteOnce

redis:
  enabled: false

# Do not let the chart create the main service accounts we already manage.
apiServer:
  serviceAccount:
    create: false
    name: airflow-sa
  nodeSelector:
    NodeGroupType: core
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

scheduler:
  serviceAccount:
    create: false
    name: airflow-sa
  nodeSelector:
    NodeGroupType: core
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

dagProcessor:
  serviceAccount:
    create: false
    name: airflow-sa
  nodeSelector:
    NodeGroupType: core
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

triggerer:
  enabled: true
  serviceAccount:
    create: false
    name: airflow-sa
  nodeSelector:
    NodeGroupType: core
  persistence:
    enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

webserver:
  service:
    type: ClusterIP
  nodeSelector:
    NodeGroupType: core
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

flower:
  enabled: false

ingress:
  web:
    enabled: false

createUserJob:
  useHelmHooks: false
  nodeSelector:
    NodeGroupType: core

migrateDatabaseJob:
  useHelmHooks: false
  nodeSelector:
    NodeGroupType: core

logs:
  persistence:
    enabled: false

config:
  core:
    executor: KubernetesExecutor
    load_examples: "False"
  kubernetes_executor:
    namespace: airflow
    delete_worker_pods: "True"
    delete_worker_pods_on_failure: "False"

# Airflow metadata persistence comes from PostgreSQL.
# Remote task log shipping to S3-compatible object storage will be added later.
extraEnv: ~
